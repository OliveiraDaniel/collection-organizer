<svg width="100%" viewBox="0 0 100 80" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="80" fill="#f5f5f5"/>

  <!-- Disco grande esquerda -->
  <g transform="translate(-4, 40)">
    <circle r="42" fill="#1a1a1a"/>
    <circle r="38" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    <circle r="33" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    <circle r="28" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    <circle r="23" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    <circle r="18" fill="none" stroke="#2a2a2a" stroke-width="1"/>
    <circle r="13" fill="#26a69a"/>
    <circle r="3.5" fill="#111"/>
  </g>

  <!-- Disco médio esquerda -->
  <g transform="translate(56, 52)">
    <circle r="22" fill="#1a1a1a"/>
    <circle r="19" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
    <circle r="15" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
    <circle r="11" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
    <circle r="7" fill="#c0392b"/>
